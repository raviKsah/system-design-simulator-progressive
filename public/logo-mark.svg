  </defs>
  <!-- edges of a 3-node system topology: the thing this app is about -->
  <path d="M16 8 L8 23 M16 8 L24 23 M8 23 L24 23" stroke="url(#sf-grad)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- nodes -->
  <circle cx="8" cy="23" r="3.1" fill="#0b1220" stroke="url(#sf-grad)" stroke-width="2.1"/>
  <circle cx="24" cy="23" r="3.1" fill="#0b1220" stroke="url(#sf-grad)" stroke-width="2.1"/>
  <!-- apex node = the "forge spark", filled/bright -->
  <circle cx="16" cy="8" r="4" fill="url(#sf-grad)"/>
  <circle cx="16" cy="8" r="1.6" fill="#0b1220"/>
</svg>
